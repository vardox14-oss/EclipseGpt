<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseGPT - Connexion</title>
    <meta name="description" content="Connectez-vous à EclipseGPT via Discord et votre clé de licence.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
    <style>
        .hidden { display: none !important; }
        .dynamic-form { transition: all 0.3s ease; }
        .discord-btn { background: #5865F2 !important; }
        .license-btn { background: #e53935 !important; }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-box">

            <div id="discordSection" class="dynamic-form">
                <div class="login-header">
                    <div class="header-logo">
                        <a href="index.html" class="logo">Eclipse<span class="logo-accent" style="color:#e53935;">GPT</span></a>
                    </div>
                    <h2>Étape 1 : Identité</h2>
                    <p class="login-subtitle">Connectez-vous avec Discord pour lier votre compte.</p>
                </div>
                
                <a href="/auth/discord" class="discord-btn" style="width: 100%; border-radius: 8px; padding: 1rem; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; text-decoration: none;">
                    <svg width="24" height="24" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg">

                    </svg>
                    Connexion Discord
                </a>
            </div>

            <div id="licenseSection" class="dynamic-form hidden">
                <div class="login-header">
                    <div class="header-logo" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                        <img id="userAvatar" src="" alt="Avatar" style="width: 64px; height: 64px; border-radius: 50%; display: none; box-shadow: 0 0 15px rgba(229, 57, 53, 0.4);">
                        <h3 id="welcomeUsername" style="color: #fff; font-size: 1.2rem; margin: 0;"></h3>
                    </div>
                    <div style="margin-top: 15px;">
                        <h2>Étape 2 : Accès Premium</h2>
                        <p class="login-subtitle">Entrez votre clé de licence pour débloquer le service.</p>
                    </div>
                </div>

                <div class="license-form" style="margin-top: 1.5rem;">
                    <input type="text" id="licenseInput" placeholder="ex: DARKGPT-1234567890ABCDEF" style="width: 100%; padding: 1rem; border-radius: 8px; border: 1px solid #333; background: #0d0d0d; color: #fff; margin-bottom: 1rem; outline: none; font-size: 1rem; font-family: monospace;">
                    <button class="license-btn" id="licenseLoginBtn" style="width: 100%; border-radius: 8px; padding: 1rem; color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s;">
                        Vérifier la clé
                    </button>
                    <div id="loginErrorMessage" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 1rem; text-align: center; min-height: 1rem;"></div>
                </div>
            </div>

            <div class="login-footer">
                <p>En te connectant, tu acceptes nos <a href="#">CGU</a></p>
            </div>
            
        </div>
    </div>

    <div id="authToast"></div>

    <script src="login.js"></script>
</body>

</html>
