<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EclipseGPT - Connexion</title>
    <meta name="description" content="Connectez-vous à EclipseGPT.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <a href="index.html" class="logo">Dark<span class="logo-accent">GPT</span></a>
                <h2>Re-bonjour</h2>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Adresse e-mail</label>
                    <input type="email" id="email" placeholder="Entrez votre e-mail" required>
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Entrez votre mot de passe" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe" checked>
                        <span class="checkmark"></span>
                        Se souvenir de moi
                    </label>
                    <a href="#" class="forgot-password">Mot de passe oublié ?</a>
                </div>

                <!-- Toast will be injected here or floating by JS -->

                <button type="submit" class="auth-btn pulse-red">Se connecter</button>
            </form>

            <div class="login-footer">
                <p>Vous n'avez pas de compte ? <a href="#" id="toggleAuthMode">S'inscrire</a></p>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
